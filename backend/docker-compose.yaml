version: '3.8'

services:
  backend:
    build:
      context: ./ERPNumber1
      dockerfile: ERPNumber1/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=ERPNumber1;User=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
    depends_on:
      - db
    networks:
      - erp-network

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrongPassword123!
      - MSSQL_PID=Express
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  mssql-data: